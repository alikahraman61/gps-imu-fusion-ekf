# ── Veri ──────────────────────────────────────────────────
data:
  basepath: "/home/ali/kitti_raw"
  date: "2011_09_30"
  drive: "0034"

# ── EKF Parametreleri ─────────────────────────────────────
ekf:
  # IMU gürültü parametreleri (OXTS RT3003)
  accel_noise: 0.1        # m/s²
  gyro_noise: 0.01        # rad/s
  accel_bias_noise: 0.001
  gyro_bias_noise: 0.0001

  # GPS gürültüsü
  gps_noise_pos: 2.0      # metre
  gps_noise_vel: 0.1      # m/s

  # Başlangıç kovaryansı
  init_cov: 0.1

  # Mahalanobis eşiği
  mahalanobis_threshold: 15.0

# ── Simülasyon ────────────────────────────────────────────
simulation:
  gps_rate: 10            # IMU/GPS oran (100Hz / 10Hz)
  gps_denied_start: 300   # frame
  gps_denied_end: 600     # frame

# ── Çıktı ─────────────────────────────────────────────────
output:
  figures_dir: "/home/ali/kitti-fusion/results/figures"
  logs_dir: "/home/ali/kitti-fusion/results/logs"